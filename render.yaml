# IMPORTANT:
# Pushing this file does NOT convert an existing Web Service into a Static Site.
# You must create a NEW Static Site in the dashboard (see RENDER-FIX.md).

services:
  - type: web
    name: mrhai1992-static
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Optional second service if you insist on a process server:
  - type: web
    name: mrhai1992-node
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.cjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: 0.0.0.0

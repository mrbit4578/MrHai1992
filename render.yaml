# Preferred: Static Site (no long-running process, no start command → no exit 127)
services:
  - type: web
    name: mrhai1992
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"

services:
  # Static Site — recommended (no process → no exit 127)
  - type: web
    name: mrhai1992
    runtime: static
    buildCommand: "test -f dist/index.html && echo ok"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Node Web Service — Start Command covered by shims + node server.cjs
  - type: web
    name: mrhai1992-web
    runtime: node
    plan: free
    buildCommand: npm install && RENDER=true npm run build
    startCommand: node server.cjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: 0.0.0.0
      - key: RENDER
        value: "true"

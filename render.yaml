# ONE service only — Static Site (no start process → no exit 127)
services:
  - type: web
    name: mrhai1992
    runtime: static
    # dist/ is committed — no npm/vite required on Render
    buildCommand: "echo prebuilt-dist && test -f dist/index.html"
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# Blueprint for NEW services. Existing Web Services do not auto-change type.
services:
  # Preferred: no start process → cannot hit exit 127 at runtime
  - type: web
    name: mrhai1992
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Fallback Web Service (Node) if you need a process
  - type: web
    name: mrhai1992-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.cjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: 0.0.0.0
